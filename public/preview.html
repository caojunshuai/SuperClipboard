<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0f0f1a; overflow: hidden; }
  body {
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .status { color: #94a3b8; font-size: 14px; }
  .error { color: #ef4444; font-size: 14px; text-align: center; }
  .close-btn {
    position: fixed; top: 12px; right: 12px;
    width: 32px; height: 32px; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08); color: #ccc; font-size: 18px;
    border-radius: 6px; cursor: pointer; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .close-btn:hover { background: rgba(239,68,68,0.5); color: #fff; }
  img { max-width: 100%; max-height: 100vh; object-fit: contain; border-radius: 6px; }
</style>
</head>
<body>
<div id="app"><span class="status">加载中...</span></div>
<script>
  var app = document.getElementById('app');
  var started = Date.now();
  var MAX_WAIT = 10000;

  function showError(msg) {
    app.innerHTML =
      '<div style="text-align:center">' +
      '<p class="error">' + msg + '</p>' +
      '<button class="close-btn" style="position:static;margin:12px auto 0" onclick="doClose()">&times;</button>' +
      '</div>';
  }

  function doClose() {
    var ipc = window.__TAURI_INTERNALS__;
    if (ipc && typeof ipc.invoke === 'function') {
      ipc.invoke('close_preview_window').catch(function() { window.close(); });
    } else {
      window.close();
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') doClose();
  });

  // Poll until __TAURI_INTERNALS__.invoke is ready.
  // The __TAURI_INTERNALS__ object is injected early, but its methods
  // (invoke, etc.) are attached asynchronously by WebView2.
  (function poll() {
    var ipc = window.__TAURI_INTERNALS__;

    if (ipc && typeof ipc.invoke === 'function') {
      // IPC is ready — get the image path and load it
      ipc.invoke('get_preview_image_path').then(function(path) {
        return ipc.invoke('read_image_base64', { path: path });
      }).then(function(dataUrl) {
        var img = document.createElement('img');
        img.src = dataUrl;
        img.alt = 'preview';
        img.onload = function() {
          document.title = '图片预览 (' + img.naturalWidth + '×' + img.naturalHeight + ')';
        };
        img.onerror = function() { showError('图片加载失败'); };
        app.innerHTML =
          '<button class="close-btn" onclick="doClose()">&times;</button>' +
          '<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%"></div>';
        app.querySelector('div').appendChild(img);
      }).catch(function(e) {
        showError('预览失败: ' + (e && e.message ? e.message : e));
      });
      return;
    }

    if (Date.now() - started > MAX_WAIT) {
      var keys = ipc ? Object.keys(ipc).join(', ') : 'ipc is null';
      showError('IPC 未就绪 (keys: ' + keys + ')');
      return;
    }

    setTimeout(poll, 50);
  })();
</script>
</body>
</html>
